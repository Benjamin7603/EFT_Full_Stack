server:
  port: 8000

spring:
  application:
    name: ms-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
      routes:
        - id: ms-usuarios-route
          uri: lb://MS-USUARIOS
          predicates:
            - Path=/api/usuarios/**
        - id: ms-reportes-route
          uri: lb://MS-REPORTES
          predicates:
            - Path=/api/reportes/**
        - id: ms-geografico-route
          uri: lb://MS-GEOGRAFICO
          predicates:
            - Path=/api/geografico/**
        - id: ms-notificaciones-route
          uri: lb://MS-NOTIFICACIONES
          predicates:
            - Path=/api/notificaciones/**

eureka:
  client:
    service-url:
      defaultZone: http://eureka:8761/eureka/
    register-with-eureka: true
    fetch-registry: true