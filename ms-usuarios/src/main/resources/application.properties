spring.application.name=ms-usuarios

# CONEXIÓN A SUPABASE

spring.datasource.url=jdbc:postgresql://[TU_URL_DE_SUPABASE].supabase.co:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=[TU_CONTRASEŃA]
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.hibernate.ddl-auto=update

# Para ver las consultas SQL en la consola de IntelliJ
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true